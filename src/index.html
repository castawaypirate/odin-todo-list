<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&apm;icon_names=keyboard_double_arrow_up,keyboard_double_arrow_down,horizontal_rule"
    />
    <title>Odin Todo List</title>
  </head>
  <body>
    <div class="container">
      <dialog id="todo-dialog">
        <form id="todo-form">
          <input type="text" id="todo-id" name="todo-id" value="" readonly />
          <div class="form-field">
            <label for="todo-title">Title</label>
            <input
              type="text"
              id="todo-title"
              name="todo-title"
              value=""
              required
            />
          </div>
          <div class="form-field">
            <label for="todo-description">Description</label>
            <input
              type="text"
              id="todo-description"
              name="todo-description"
              value=""
            />
          </div>
          <div class="form-field">
            <label for="todo-dueDate">Due Date</label>
            <input type="date" id="todo-dueDate" name="todo-dueDate" value="" />
          </div>
          <div class="form-field">
            <label for="todo-priority">Priority</label>
            <select id="todo-priority" name="todo-priority">
              <option value="">--Please choose priority--</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>

          <div class="form-field">
            <label for="todo-completed">Completed</label>
            <input type="checkbox" id="todo-completed" name="todo-completed" value="completed" />
          </div>

          <div class="form-field">
            <label for="todo-project">Project</label>
            <select id="todo-project" name="todo-project"></select>
          </div>
        </form>
        <div class="dialog-buttons">
          <button type="submit" id="submit-todo" form="todo-form">
            Submit
          </button>
          <button id="close-todo-dialog">Close</button>
        </div>
      </dialog>

      <dialog id="project-dialog">
        <form id="project-form">
          <input
            type="text"
            id="project-id"
            name="project-id"
            value=""
            readonly
          />
          <div class="form-field">
            <label for="project-title">Title</label>
            <input
              type="text"
              id="project-title"
              name="project-title"
              value=""
              required
            />
          </div>
        </form>
        <div class="dialog-buttons">
          <button type="submit" id="submit-project" form="project-form">
            Submit
          </button>
          <button id="close-project-dialog">Close</button>
        </div>
      </dialog>

      <button class="toggle" type="button">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          height="24px"
          viewBox="0 -960 960 960"
          width="24px"
          fill="#e3e3e3"
        >
          <path
            d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"
          />
        </svg>
      </button>

      <nav id="sidebar" class="min">
        <ul>
          <li id="add-todo">
            <div class="list-item">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                height="24px"
                viewBox="0 -960 960 960"
                width="24px"
                fill="#e3e3e3"
              >
                <path
                  d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"
                />
              </svg>
              <span>add todo</span>
            </div>
          </li>
          <li id="projects">
            <div id="project-list" class="list-item">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                height="24px"
                viewBox="0 -960 960 960"
                width="24px"
                fill="#e3e3e3"
              >
                <path
                  d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h168q13-36 43.5-58t68.5-22q38 0 68.5 22t43.5 58h168q33 0 56.5 23.5T840-760v560q0 33-23.5 56.5T760-120H200Zm0-80h560v-560H200v560Zm80-80h280v-80H280v80Zm0-160h400v-80H280v80Zm0-160h400v-80H280v80Zm221.5-198.5Q510-807 510-820t-8.5-21.5Q493-850 480-850t-21.5 8.5Q450-833 450-820t8.5 21.5Q467-790 480-790t21.5-8.5ZM200-200v-560 560Z"
                />
              </svg>
              <span>projects</span>
            </div>
            <ul id="nav-project-list" class="hide"></ul>
          </li>
        </ul>
      </nav>

      <main id="content"></main>
    </div>
  </body>
</html>
